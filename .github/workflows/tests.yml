name: Python Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Test Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest python-dotenv

      - name: Run Tests
        run: pytest -q
